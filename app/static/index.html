<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WR Meta Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/scrim.css">
    <style>
      /* ===== META VIEWER INLINE STYLES ===== */
      .source-banner {
        margin-bottom: 0.4rem;
        color: var(--text-muted);
        font-size: 0.78rem;
        letter-spacing: 0.03em;
        font-family: var(--font-mono);
      }
      .controls {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .controls label {
        font-weight: 600;
        font-size: 0.82rem;
        color: var(--text-secondary);
        letter-spacing: 0.02em;
      }
      .controls select,
      .controls input[type="checkbox"] {
        accent-color: var(--accent);
      }
      .controls select {
        background: var(--surface);
        color: var(--text-primary);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.4rem 0.6rem;
        font-size: 0.85rem;
        font-family: var(--font-mono);
      }
      .controls select:focus {
        border-color: var(--accent);
        outline: none;
        box-shadow: 0 0 0 2px var(--accent-glow);
      }
      .controls button {
        padding: 0.45rem 1rem;
        border: 1px solid var(--accent);
        border-radius: 4px;
        background: transparent;
        color: var(--accent);
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .controls button:hover {
        background: var(--accent);
        color: var(--bg-deep);
        box-shadow: 0 0 12px var(--accent-glow);
      }
      #forceRefresh {
        border-color: var(--magenta) !important;
        color: var(--magenta) !important;
      }
      #forceRefresh:hover {
        background: var(--magenta) !important;
        color: var(--bg-deep) !important;
        box-shadow: 0 0 12px rgba(232, 121, 249, 0.3) !important;
      }
      .view-tabs {
        display: inline-flex;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }
      .view-tab {
        border: none;
        background: var(--surface);
        padding: 0.5rem 1rem;
        cursor: pointer;
        font-weight: 700;
        font-family: var(--font-heading);
        font-size: 0.82rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-secondary);
        transition: all 0.2s;
      }
      .view-tab.active {
        background: var(--accent);
        color: var(--bg-deep);
      }
      .view-tab:hover:not(.active) {
        background: var(--surface-hover);
        color: var(--text-primary);
      }
      /* Meta table */
      .meta-table-wrap {
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 0.6rem 0.75rem;
        text-align: left;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }
      th {
        background: var(--surface);
        color: var(--text-secondary);
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      th.sortable {
        cursor: pointer;
        user-select: none;
        transition: color 0.15s;
      }
      th.sortable:hover {
        color: var(--accent);
      }
      td {
        color: var(--text-primary);
        font-family: var(--font-mono);
        font-size: 0.82rem;
      }
      tr:hover td {
        background: var(--surface-hover);
      }
      tr:last-child td {
        border-bottom: none;
      }
      .champ-cell {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-family: var(--font-heading);
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .champ-avatar {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        object-fit: cover;
        background: var(--surface);
        flex-shrink: 0;
        border: 1px solid var(--border);
      }
      .champ-avatar-fallback {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        background: var(--accent);
        color: var(--bg-deep);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.78rem;
        flex-shrink: 0;
      }
      #message {
        margin-top: 0.75rem;
        color: var(--text-muted);
        font-size: 0.78rem;
        font-family: var(--font-mono);
        letter-spacing: 0.02em;
      }
      .warning-banner {
        background: rgba(251, 191, 36, 0.1);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 6px;
        padding: 0.6rem 0.9rem;
        margin-bottom: 1rem;
        font-size: 0.82rem;
        display: none;
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-icon">&#9876;</span>
          <span class="brand-text">WR<span class="brand-accent">META</span></span>
        </div>
        <nav class="top-nav">
          <button id="navMeta" class="active" onclick="switchSection('meta')">Meta Viewer</button>
          <button id="navOpenSeries" onclick="switchSection('openseries')">Open Series</button>
          <button id="navScrim" style="display:none" onclick="switchSection('scrim')">Scrim Tracker</button>
          <button id="navPlayer" style="display:none" onclick="switchSection('player')">Player Tracker</button>
        </nav>
        <div id="userArea" style="margin-left:auto;display:flex;align-items:center;gap:0.6rem;font-size:0.82rem;font-family:var(--font-mono);">
          <span id="userInfo" style="color:var(--text-secondary);display:none;"></span>
          <span id="userPlan" style="display:none;font-size:0.7rem;padding:0.15rem 0.45rem;border-radius:3px;font-weight:600;letter-spacing:0.04em;"></span>
          <a id="loginBtn" href="/login" style="color:var(--accent);text-decoration:none;font-weight:600;">Login</a>
          <button id="logoutBtn" style="display:none;background:none;border:1px solid var(--border);color:var(--text-muted);padding:0.3rem 0.6rem;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:0.78rem;" onclick="doLogout()">Sair</button>
        </div>
      </header>

      <main class="app-main">
        <section id="metaSection">
          <div class="section-header">
            <h1>Meta Viewer</h1>
            <span class="section-tag">CN SERVER DATA</span>
          </div>
          <div id="sourceLabel" class="source-banner">Fonte: sample</div>
          <div id="cnTimestamp" class="source-banner"></div>

          <div class="controls">
            <label>
              Role
              <select id="role">
                <option value="top">top</option>
                <option value="jungle">jungle</option>
                <option value="mid">mid</option>
                <option value="adc">adc</option>
                <option value="support">support</option>
              </select>
            </label>

            <label>
              Tier
              <select id="tier">
                <option value="diamond_plus">Diamante+</option>
                <option value="master">Mestre</option>
                <option value="monarch">Monarca</option>
                <option value="rift_peak">Pico do Rift</option>
              </select>
            </label>

            <label>
              <input id="useCn" type="checkbox" checked />
              Usar dados CN
            </label>

            <button id="load">Carregar</button>
            <button id="forceRefresh" title="Forcar atualizacao dos dados CN">Forcar Refresh</button>
          </div>

          <div id="warningBanner" class="warning-banner"></div>

          <div class="view-tabs">
            <button id="tabDraft" class="view-tab active" data-view="draft">Draft Priority</button>
            <button id="tabPower" class="view-tab" data-view="power">Power (PBI-like)</button>
            <button id="tabTier" class="view-tab" data-view="tier">Tier List</button>
          </div>

          <div id="tierListView" style="display:none"></div>
          <div class="meta-table-wrap" id="metaTableWrap">
            <table>
              <thead>
                <tr>
                  <th class="sortable" data-sort="champion">Champion</th>
                  <th class="sortable" data-sort="win">Win</th>
                  <th class="sortable" data-sort="pick">Pick</th>
                  <th class="sortable" data-sort="ban">Ban</th>
                  <th class="sortable" data-sort="presence">Presence</th>
                  <th id="scoreHeader" class="sortable" data-sort="draft_score">Draft Priority</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>

          <div id="message"></div>

          <script>
            const loadButton = document.getElementById("load");
            const roleSelect = document.getElementById("role");
            const tierSelect = document.getElementById("tier");
            const useCnCheckbox = document.getElementById("useCn");
            const rowsBody = document.getElementById("rows");
            const message = document.getElementById("message");
            const sourceLabel = document.getElementById("sourceLabel");
            const cnTimestamp = document.getElementById("cnTimestamp");
            const tabDraft = document.getElementById("tabDraft");
            const tabPower = document.getElementById("tabPower");
            const tabTier = document.getElementById("tabTier");
            const scoreHeader = document.getElementById("scoreHeader");
            const sortableHeaders = document.querySelectorAll("th.sortable");
            const warningBanner = document.getElementById("warningBanner");
            const forceRefreshBtn = document.getElementById("forceRefresh");
            const tierListView = document.getElementById("tierListView");
            const metaTableWrap = document.getElementById("metaTableWrap");

            let lastLoadedItems = [];

            const state = {
              view: "draft",
              sort: "draft_score",
              dir: "desc",
            };

            function pct(value) {
              return `${(value * 100).toFixed(1)}%`;
            }

            function currentScoreField() {
              return state.view === "power" ? "power_score" : "draft_score";
            }

            function updateTabs() {
              tabDraft.classList.toggle("active", state.view === "draft");
              tabPower.classList.toggle("active", state.view === "power");
              tabTier.classList.toggle("active", state.view === "tier");
              metaTableWrap.style.display = state.view === "tier" ? "none" : "";
              tierListView.style.display = state.view === "tier" ? "" : "none";
            }

            function labelForSort(sortKey) {
              if (sortKey === "champion") return "Champion";
              if (sortKey === "win") return "Win";
              if (sortKey === "pick") return "Pick";
              if (sortKey === "ban") return "Ban";
              if (sortKey === "presence") return "Presence";
              return state.view === "power" ? "Power" : "Draft Priority";
            }

            function updateHeaders() {
              const scoreField = currentScoreField();
              scoreHeader.dataset.sort = scoreField;
              scoreHeader.textContent = state.view === "power" ? "Power (PBI-like)" : "Draft Priority";

              sortableHeaders.forEach((header) => {
                const key = header.dataset.sort;
                const isActive = key === state.sort;
                const arrow = isActive ? (state.dir === "asc" ? " \u2191" : " \u2193") : "";
                header.textContent = `${labelForSort(key)}${arrow}`;
              });
            }

            function renderMetaTierList(items) {
              if (!items.length) { tierListView.innerHTML = '<p style="color:#999">Sem dados</p>'; return; }
              // Score based on draft_score (already computed by backend)
              const scored = items.map(item => ({
                ...item,
                score: item.draft_score ?? item.priority_score ?? 0,
              }));
              scored.sort((a, b) => b.score - a.score);

              // Percentile-based tiers
              const len = scored.length;
              const tiers = { S: [], A: [], B: [], C: [], D: [] };
              scored.forEach((item, i) => {
                const pctile = i / len;
                const tier = pctile < 0.10 ? "S" : pctile < 0.25 ? "A" : pctile < 0.50 ? "B" : pctile < 0.75 ? "C" : "D";
                tiers[tier].push(item);
              });

              const tierColors = { S: "#f59e0b", A: "#22d3ee", B: "#10b981", C: "#6b7280", D: "#ef4444" };
              let html = "";
              for (const [label, champs] of Object.entries(tiers)) {
                if (!champs.length) continue;
                html += `<div style="display:flex;align-items:stretch;margin-bottom:2px;min-height:48px">
                  <div style="min-width:40px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.2rem;background:${tierColors[label]}22;color:${tierColors[label]};border-left:3px solid ${tierColors[label]};padding:6px">${label}</div>
                  <div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px;align-items:center;flex:1;background:var(--surface-raised, #1a2332)">
                    ${champs.map(c => {
                      const name = c.champion || "?";
                      const av = c.avatar_url ? `<img src="${c.avatar_url}" alt="${name}" style="width:32px;height:32px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">` : "";
                      return `<div title="${name} — WR: ${pct(c.winrate)} | Pick: ${pct(c.pickrate)} | Ban: ${pct(c.banrate)} | Score: ${c.score.toFixed(3)}" style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:42px">
                        ${av}<span style="font-size:0.6rem;color:#94a3b8;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
                      </div>`;
                    }).join("")}
                  </div>
                </div>`;
              }
              tierListView.innerHTML = html;
            }

            function champCell(item) {
              const name = item.champion || "?";
              if (item.avatar_url) {
                return `<td><div class="champ-cell"><img class="champ-avatar" src="${item.avatar_url}" alt="${name}" onerror="this.outerHTML='<span class=\\'champ-avatar-fallback\\'>${name[0]}</span>'">${name}</div></td>`;
              }
              return `<td><div class="champ-cell"><span class="champ-avatar-fallback">${name[0]}</span>${name}</div></td>`;
            }

            function render(items) {
              rowsBody.innerHTML = "";
              const scoreField = currentScoreField();

              items.forEach((item) => {
                const tr = document.createElement("tr");
                const presence = (item.pickrate || 0) + (item.banrate || 0);
                tr.innerHTML = `
                  ${champCell(item)}
                  <td>${pct(item.winrate)}</td>
                  <td>${pct(item.pickrate)}</td>
                  <td>${pct(item.banrate)}</td>
                  <td>${pct(presence)}</td>
                  <td>${(item[scoreField] ?? item.priority_score).toFixed(3)}</td>
                `;
                rowsBody.appendChild(tr);
              });
            }

            function formatCnTimestamp(isoDate) {
              if (!isoDate) return "";
              const parsed = new Date(isoDate);
              if (Number.isNaN(parsed.getTime())) {
                return `Dados CN obtidos em: ${isoDate}`;
              }
              return `Dados CN obtidos em: ${parsed.toLocaleString("pt-BR")}`;
            }

            async function refreshSourceLabel() {
              try {
                const response = await fetch("/meta/source");
                if (!response.ok) return;
                const data = await response.json();
                sourceLabel.textContent = `Fonte: ${data.source}`;
                cnTimestamp.textContent = formatCnTimestamp(data.last_fetch);
              } catch (err) {
                // silent fallback
              }
            }

            async function loadMeta(refresh) {
              const role = roleSelect.value;
              const tier = tierSelect.value;
              const source = useCnCheckbox.checked ? "auto" : "sample";
              const scoreSort = currentScoreField();

              if (!["champion", "win", "pick", "ban", "presence", "draft_score", "power_score"].includes(state.sort)) {
                state.sort = scoreSort;
              }

              rowsBody.innerHTML = "";
              message.textContent = "Carregando...";
              warningBanner.style.display = "none";

              try {
                const query = new URLSearchParams({
                  role,
                  tier,
                  source,
                  view: state.view,
                  sort: state.sort,
                  dir: state.dir,
                });
                if (refresh) query.set("refresh", "force");
                const response = await fetch(`/meta?${query.toString()}`);
                if (!response.ok) {
                  throw new Error("Falha ao carregar dados");
                }
                const data = await response.json();
                lastLoadedItems = data.items;
                render(data.items);
                if (state.view === "tier") renderMetaTierList(data.items);
                sourceLabel.textContent = `Fonte: ${data.source}`;
                cnTimestamp.textContent = formatCnTimestamp(data.last_fetch);
                message.textContent = `Mostrando ${data.items.length} campe\u00f5es \u00b7 ordenado por ${labelForSort(state.sort)} (${state.dir})`;
                if (data.warning) {
                  warningBanner.textContent = data.warning;
                  warningBanner.style.display = "block";
                }
              } catch (err) {
                rowsBody.innerHTML = "";
                message.textContent = err.message;
                cnTimestamp.textContent = "";
                await refreshSourceLabel();
              }
            }

            function setView(view) {
              state.view = view;
              const scoreField = currentScoreField();
              if (state.sort === "draft_score" || state.sort === "power_score") {
                state.sort = scoreField;
              }
              updateTabs();
              updateHeaders();
              if (view === "tier" && lastLoadedItems.length) {
                renderMetaTierList(lastLoadedItems);
              } else {
                loadMeta();
              }
            }

            function onSortClick(header) {
              const key = header.dataset.sort;
              if (state.sort === key) {
                state.dir = state.dir === "asc" ? "desc" : "asc";
              } else {
                state.sort = key;
                state.dir = key === "champion" ? "asc" : "desc";
              }
              updateHeaders();
              loadMeta();
            }

            tabDraft.addEventListener("click", () => setView("draft"));
            tabPower.addEventListener("click", () => setView("power"));
            tabTier.addEventListener("click", () => setView("tier"));
            loadButton.addEventListener("click", () => loadMeta());
            forceRefreshBtn.addEventListener("click", () => {
              forceRefreshBtn.disabled = true;
              forceRefreshBtn.textContent = "Atualizando...";
              fetch("/api/champions/refresh").finally(() => {
                forceRefreshBtn.disabled = false;
                forceRefreshBtn.textContent = "Forcar Refresh";
              });
              loadMeta(true);
            });
            sortableHeaders.forEach((header) => header.addEventListener("click", () => onSortClick(header)));

            updateTabs();
            updateHeaders();
            loadMeta();
          </script>
        </section>

        <section id="scrimSection" style="display:none">
          <div class="section-header">
            <h1>Scrim Tracker</h1>
            <span class="section-tag">MATCH ANALYTICS</span>
          </div>
          <div class="scrim-tabs" id="scrimSubTabs"></div>
          <div id="scrimContent"></div>
        </section>

        <section id="playerSection" style="display:none">
          <div class="section-header">
            <h1>Player Tracker</h1>
            <span class="section-tag">PERSONAL STATS</span>
          </div>
          <div id="playerContent"></div>
        </section>

        <section id="openseriesSection" style="display:none">
          <div class="section-header">
            <h1>Open Series Meta</h1>
            <span class="section-tag">BR COMPETITIVE DATA</span>
          </div>
          <div id="osSourceBanner" class="source-banner" style="margin-bottom:0.5rem;">Fonte: openseries.com.br</div>
          <div style="display:flex;gap:0.6rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap;">
            <input id="osSearch" type="text" placeholder="Buscar campeão..." style="background:var(--surface);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem 0.7rem;font-family:var(--font-mono);font-size:0.85rem;min-width:180px;">
            <select id="osSortField" style="background:var(--surface);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem 0.6rem;font-family:var(--font-mono);font-size:0.82rem;">
              <option value="pick_rate">Pick Rate</option>
              <option value="ban_rate">Ban Rate</option>
              <option value="win_rate">Win Rate</option>
              <option value="kda">KDA</option>
              <option value="avg_gold">Gold Médio</option>
              <option value="champion">Nome</option>
            </select>
            <select id="osSortDir" style="background:var(--surface);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem 0.6rem;font-family:var(--font-mono);font-size:0.82rem;">
              <option value="desc">↓ Desc</option>
              <option value="asc">↑ Asc</option>
            </select>
            <button onclick="loadOpenSeries(true)" style="background:var(--accent-dim);color:var(--text-primary);border:1px solid var(--accent);border-radius:4px;padding:0.4rem 0.8rem;font-family:var(--font-heading);font-size:0.8rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;">↺ ATUALIZAR</button>
          </div>
          <div id="osContent" style="overflow-x:auto;"></div>
        </section>
      </main>
    </div>

    <script src="/static/scrim.js"></script>
    <script>
      let currentUser = null;

      const PLAN_COLORS = {
        free: { bg: 'rgba(100,116,139,0.2)', color: '#94a3b8' },
        player: { bg: 'rgba(34,211,238,0.15)', color: '#22d3ee' },
        coach: { bg: 'rgba(74,222,128,0.15)', color: '#4ade80' },
        owner: { bg: 'rgba(251,191,36,0.15)', color: '#fbbf24' },
      };

      async function checkAuth() {
        try {
          const res = await fetch('/api/auth/me');
          if (!res.ok) return null;
          const data = await res.json();
          return data.user;
        } catch { return null; }
      }

      function updateNav(user) {
        currentUser = user;
        const navScrim = document.getElementById('navScrim');
        const navPlayer = document.getElementById('navPlayer');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const userPlan = document.getElementById('userPlan');

        if (user) {
          loginBtn.style.display = 'none';
          logoutBtn.style.display = '';
          userInfo.style.display = '';
          userInfo.textContent = user.display_name;
          userPlan.style.display = '';
          userPlan.textContent = user.plan.toUpperCase();
          const pc = PLAN_COLORS[user.plan] || PLAN_COLORS.free;
          userPlan.style.background = pc.bg;
          userPlan.style.color = pc.color;

          if (user.plan === 'coach' || user.plan === 'owner') {
            navScrim.style.display = '';
            navPlayer.style.display = '';
          }
          if (user.plan === 'player') {
            navPlayer.style.display = '';
          }
        } else {
          loginBtn.style.display = '';
          logoutBtn.style.display = 'none';
          userInfo.style.display = 'none';
          userPlan.style.display = 'none';
          navScrim.style.display = 'none';
          navPlayer.style.display = 'none';
        }
      }

      async function doLogout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        currentUser = null;
        updateNav(null);
        switchSection('meta');
      }

      function switchSection(section) {
        const metaEl = document.getElementById('metaSection');
        const scrimEl = document.getElementById('scrimSection');
        const playerEl = document.getElementById('playerSection');
        const osEl = document.getElementById('openseriesSection');

        document.querySelectorAll('.top-nav button').forEach(b => b.classList.remove('active'));
        metaEl.style.display = 'none';
        scrimEl.style.display = 'none';
        playerEl.style.display = 'none';
        osEl.style.display = 'none';

        if (section === 'scrim') {
          scrimEl.style.display = '';
          document.getElementById('navScrim').classList.add('active');
          window.initScrim();
        } else if (section === 'player') {
          playerEl.style.display = '';
          document.getElementById('navPlayer').classList.add('active');
          window.initPlayer();
        } else if (section === 'openseries') {
          osEl.style.display = '';
          document.getElementById('navOpenSeries').classList.add('active');
          initOpenSeries();
        } else {
          metaEl.style.display = '';
          document.getElementById('navMeta').classList.add('active');
        }
      }

      // ============================================================
      // Player Tracker
      // ============================================================
      let playerInited = false;

      window.initPlayer = function () {
        if (playerInited) return;
        playerInited = true;
        loadPlayerData();
      };

      async function loadPlayerData() {
        const wrap = document.getElementById('playerContent');
        wrap.innerHTML = '<p style="color:var(--text-muted)">Carregando...</p>';

        try {
          const [statsRes, matchesRes, champsRes, cmpRes] = await Promise.all([
            fetch('/api/player/stats'),
            fetch('/api/player/matches'),
            fetch('/api/champions'),
            fetch('/api/player/stats/comparison'),
          ]);

          if (!statsRes.ok || !matchesRes.ok) {
            wrap.innerHTML = '<p style="color:var(--red)">Erro ao carregar dados do jogador.</p>';
            return;
          }

          const stats = await statsRes.json();
          const matches = await matchesRes.json();
          const champs = champsRes.ok ? await champsRes.json() : [];
          const cmpData = cmpRes.ok ? await cmpRes.json() : null;

          renderPlayer(wrap, stats, matches, champs, cmpData);
        } catch (err) {
          wrap.innerHTML = `<p style="color:var(--red)">Erro: ${err.message}</p>`;
        }
      }

      function renderPlayer(wrap, stats, matches, champs, cmpData) {
        const o = stats.overall || {};
        const streaks = stats.streaks || {};
        const bests = stats.personal_bests || {};
        const trends = stats.trends || {};
        const champMap = {};
        champs.forEach(c => { champMap[c.name] = c.avatar_url; });

        let html = '';

        // Overview cards
        html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.8rem;margin-bottom:1rem;">
          <div class="stat-card"><div class="stat-label">Partidas</div><div class="stat-value">${o.total_games || 0}</div></div>
          <div class="stat-card"><div class="stat-label">Winrate</div><div class="stat-value" style="color:${(o.winrate||0)>=50?'var(--green)':'var(--red)'}">${o.winrate || 0}%</div></div>
          <div class="stat-card"><div class="stat-label">KDA</div><div class="stat-value">${o.kda || 0}</div></div>
          <div class="stat-card"><div class="stat-label">MVPs</div><div class="stat-value" style="color:var(--gold)">${o.total_mvp || 0}</div></div>
        </div>`;

        // Streak section
        if (streaks.current_streak > 0) {
          const isWin = streaks.current_streak_type === 'win';
          const streakColor = isWin ? 'var(--green)' : 'var(--red)';
          const streakLabel = isWin ? 'SEQUÊNCIA DE VITÓRIAS' : 'SEQUÊNCIA DE DERROTAS';
          html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.8rem;margin-bottom:1.5rem;">
            <div class="stat-card" style="border-color:${streakColor};">
              <div class="stat-label">${streakLabel}</div>
              <div class="stat-value" style="color:${streakColor}">${streaks.current_streak}x</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Maior Sequência Win</div>
              <div class="stat-value" style="color:var(--green)">${streaks.longest_win || 0}x</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Maior Sequência Loss</div>
              <div class="stat-value" style="color:var(--red)">${streaks.longest_loss || 0}x</div>
            </div>
          </div>`;
        }

        // Add match form
        html += `<details id="playerAddForm" style="margin-bottom:1.5rem;">
          <summary style="cursor:pointer;color:var(--accent);font-weight:600;font-family:var(--font-heading);font-size:0.95rem;letter-spacing:0.03em;">+ ADICIONAR PARTIDA</summary>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.2rem;margin-top:0.6rem;">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.8rem;">
              <div class="form-group"><label>Data</label><input type="date" id="pDate" value="${new Date().toISOString().slice(0,10)}" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;"></div>
              <div class="form-group"><label>Champion</label><input type="text" id="pChamp" list="pChampList" placeholder="Ex: Yasuo" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;">
                <datalist id="pChampList">${champs.map(c=>`<option value="${c.name}">`).join('')}</datalist></div>
              <div class="form-group"><label>Role</label><select id="pRole" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;">
                <option value="top">Top</option><option value="jungle">Jungle</option><option value="mid">Mid</option><option value="bot">Bot</option><option value="support">Support</option></select></div>
              <div class="form-group"><label>Resultado</label><select id="pResult" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;">
                <option value="win">Win</option><option value="loss">Loss</option></select></div>
              <div class="form-group"><label>Kills</label><input type="number" id="pKills" value="0" min="0" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;"></div>
              <div class="form-group"><label>Deaths</label><input type="number" id="pDeaths" value="0" min="0" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;"></div>
              <div class="form-group"><label>Assists</label><input type="number" id="pAssists" value="0" min="0" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;"></div>
              <div class="form-group"><label>Modo</label><select id="pMode" style="background:var(--bg-main);color:var(--text-primary);border:1px solid var(--border);border-radius:4px;padding:0.4rem;width:100%;font-family:var(--font-mono);font-size:0.85rem;">
                <option value="ranked">Ranked</option><option value="normal">Normal</option><option value="custom">Custom</option><option value="scrim">Scrim</option></select></div>
            </div>
            <div style="display:flex;gap:0.6rem;align-items:center;margin-top:0.8rem;">
              <label style="font-size:0.82rem;color:var(--text-secondary);display:flex;align-items:center;gap:0.3rem;"><input type="checkbox" id="pMvp"> MVP</label>
              <label style="font-size:0.82rem;color:var(--text-secondary);display:flex;align-items:center;gap:0.3rem;"><input type="checkbox" id="pSvp"> SVP</label>
            </div>
            <button onclick="submitPlayerMatch()" style="margin-top:0.8rem;padding:0.5rem 1.5rem;background:var(--accent-dim);color:var(--text-primary);border:1px solid var(--accent);border-radius:6px;font-family:var(--font-heading);font-weight:700;cursor:pointer;letter-spacing:0.03em;">SALVAR</button>
          </div>
        </details>`;

        // Champion stats table
        if (stats.champions && stats.champions.length) {
          html += `<h3 style="font-family:var(--font-heading);color:var(--accent);margin-bottom:0.6rem;font-size:1rem;">Champions</h3>`;
          html += `<div style="overflow-x:auto;margin-bottom:1.5rem;"><table class="data-table"><thead><tr>
            <th>CHAMPION</th><th>GAMES</th><th>WIN%</th><th>KDA</th><th>MVPs</th>
          </tr></thead><tbody>`;
          for (const c of stats.champions) {
            const avatar = champMap[c.champion] ? `<img src="${champMap[c.champion]}" width="24" height="24" style="border-radius:4px;vertical-align:middle;margin-right:0.4rem;">` : '';
            html += `<tr>
              <td>${avatar}${c.champion}</td>
              <td>${c.games}</td>
              <td style="color:${c.winrate>=50?'var(--green)':'var(--red)'}">${c.winrate}%</td>
              <td>${c.kda}</td>
              <td style="color:var(--gold)">${c.mvps || 0}</td>
            </tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Role stats
        if (stats.roles && stats.roles.length) {
          html += `<h3 style="font-family:var(--font-heading);color:var(--accent);margin-bottom:0.6rem;font-size:1rem;">Por Role</h3>`;
          html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.6rem;margin-bottom:1.5rem;">`;
          for (const r of stats.roles) {
            html += `<div class="stat-card">
              <div class="stat-label" style="text-transform:uppercase">${r.role}</div>
              <div style="font-size:0.85rem;">${r.games} games &middot; <span style="color:${r.winrate>=50?'var(--green)':'var(--red)'}">${r.winrate}%</span> &middot; KDA ${r.kda}</div>
            </div>`;
          }
          html += `</div>`;
        }

        // Personal bests
        if (bests.best_kda || bests.most_kills || bests.most_assists) {
          html += `<h3 style="font-family:var(--font-heading);color:var(--accent);margin-bottom:0.6rem;font-size:1rem;">Personal Bests</h3>`;
          html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.6rem;margin-bottom:1.5rem;">`;
          const bestItems = [
            { label: 'Melhor KDA', game: bests.best_kda, value: bests.best_kda ? `${bests.best_kda.kda} KDA` : '-' },
            { label: 'Mais Kills', game: bests.most_kills, value: bests.most_kills ? `${bests.most_kills.kills} kills` : '-' },
            { label: 'Mais Assists', game: bests.most_assists, value: bests.most_assists ? `${bests.most_assists.assists} assists` : '-' },
          ];
          for (const bi of bestItems) {
            const g = bi.game;
            const champImg = g && champMap[g.champion] ? `<img src="${champMap[g.champion]}" width="20" height="20" style="border-radius:3px;vertical-align:middle;margin-right:0.3rem;">` : '';
            const detail = g ? `${champImg}${g.champion} · ${g.kills}/${g.deaths}/${g.assists} · ${g.date}` : '';
            html += `<div class="stat-card">
              <div class="stat-label">${bi.label}</div>
              <div class="stat-value" style="color:var(--gold);font-size:1.3rem;">${bi.value}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem;">${detail}</div>
            </div>`;
          }
          html += `</div>`;
        }

        // Improvement trends
        if (trends.last10 && trends.last10.games > 0) {
          html += `<h3 style="font-family:var(--font-heading);color:var(--accent);margin-bottom:0.6rem;font-size:1rem;">Tendencia de Melhora</h3>`;
          html += `<div style="overflow-x:auto;margin-bottom:1.5rem;"><table class="data-table"><thead><tr>
            <th>PERIODO</th><th>PARTIDAS</th><th>WIN%</th><th>KDA</th><th>K</th><th>D</th><th>A</th>
          </tr></thead><tbody>`;
          const periods = [
            { label: 'Ultimas 10', d: trends.last10 },
            { label: 'Ultimas 20', d: trends.last20 },
            { label: 'Geral', d: trends.all_time },
          ];
          for (const p of periods) {
            if (!p.d || !p.d.games) continue;
            const wColor = p.d.winrate >= 50 ? 'var(--green)' : 'var(--red)';
            html += `<tr>
              <td style="font-weight:600;">${p.label}</td>
              <td>${p.d.games}</td>
              <td style="color:${wColor}">${p.d.winrate}%</td>
              <td>${p.d.kda}</td>
              <td>${p.d.avg_kills}</td>
              <td>${p.d.avg_deaths}</td>
              <td>${p.d.avg_assists}</td>
            </tr>`;
          }
          html += `</tbody></table></div>`;
        }

        // Comparison: player vs team
        if (cmpData && cmpData.comparison && cmpData.comparison.length > 0) {
          html += `<h3 style="font-family:var(--font-heading);color:var(--accent);margin-bottom:0.6rem;font-size:1rem;">Eu vs Time (por Role)</h3>`;
          html += `<div style="overflow-x:auto;margin-bottom:1.5rem;"><table class="data-table"><thead><tr>
            <th>ROLE</th><th>FONTE</th><th>GAMES</th><th>WIN%</th><th>KDA</th><th>K</th><th>D</th><th>A</th>
          </tr></thead><tbody>`;
          for (const row of cmpData.comparison) {
            const hasPlayer = row.player && row.player.games > 0;
            const hasTeam = row.team && row.team.games > 0;
            if (hasPlayer) {
              const p = row.player;
              html += `<tr style="background:rgba(34,211,238,0.05);">
                <td rowspan="${hasTeam ? 2 : 1}" style="font-weight:700;text-transform:uppercase;vertical-align:middle;">${row.role}</td>
                <td style="color:var(--accent);font-size:0.8rem;">Eu</td>
                <td>${p.games}</td>
                <td style="color:${p.winrate>=50?'var(--green)':'var(--red)'}">${p.winrate}%</td>
                <td>${p.kda}</td>
                <td>${p.avg_kills}</td>
                <td>${p.avg_deaths}</td>
                <td>${p.avg_assists}</td>
              </tr>`;
            }
            if (hasTeam) {
              const t = row.team;
              if (!hasPlayer) {
                html += `<tr><td style="font-weight:700;text-transform:uppercase;">${row.role}</td>`;
              } else {
                html += `<tr>`;
              }
              html += `<td style="color:var(--text-muted);font-size:0.8rem;">Time</td>
                <td>${t.games}</td>
                <td style="color:${t.winrate>=50?'var(--green)':'var(--red)'}">-</td>
                <td>${t.kda}</td>
                <td>${t.avg_kills}</td>
                <td>${t.avg_deaths}</td>
                <td>${t.avg_assists}</td>
              </tr>`;
            }
          }
          html += `</tbody></table></div>`;
        }

        // Match history
        html += `<h3 style="font-family:var(--font-heading);color:var(--accent);margin-bottom:0.6rem;font-size:1rem;">Historico</h3>`;
        if (matches.length === 0) {
          html += `<p style="color:var(--text-muted)">Nenhuma partida registrada ainda.</p>`;
        } else {
          html += `<div style="display:flex;flex-direction:column;gap:0.5rem;">`;
          for (const m of matches) {
            const avatar = champMap[m.champion] ? `<img src="${champMap[m.champion]}" width="28" height="28" style="border-radius:4px;vertical-align:middle;margin-right:0.5rem;">` : '';
            const winColor = m.result === 'win' ? 'var(--green)' : 'var(--red)';
            const kda = `${m.kills}/${m.deaths}/${m.assists}`;
            html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.8rem;display:flex;align-items:center;gap:0.8rem;font-size:0.85rem;">
              ${avatar}
              <span style="font-weight:600;min-width:90px;">${m.champion}</span>
              <span style="color:var(--text-muted);min-width:55px;">${m.role}</span>
              <span style="color:${winColor};font-weight:700;min-width:35px;">${m.result.toUpperCase()}</span>
              <span style="font-family:var(--font-mono);min-width:70px;">${kda}</span>
              <span style="color:var(--text-muted);font-size:0.78rem;">${m.date}</span>
              ${m.is_mvp ? '<span style="color:var(--gold);font-weight:700;font-size:0.75rem;">MVP</span>' : ''}
              <button onclick="deletePlayerMatch(${m.id})" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;font-size:0.8rem;opacity:0.6;" title="Remover">&#10005;</button>
            </div>`;
          }
          html += `</div>`;
        }

        wrap.innerHTML = html;
      }

      async function submitPlayerMatch() {
        const body = {
          date: document.getElementById('pDate').value,
          champion: document.getElementById('pChamp').value.trim(),
          role: document.getElementById('pRole').value,
          result: document.getElementById('pResult').value,
          kills: parseInt(document.getElementById('pKills').value) || 0,
          deaths: parseInt(document.getElementById('pDeaths').value) || 0,
          assists: parseInt(document.getElementById('pAssists').value) || 0,
          game_mode: document.getElementById('pMode').value,
          is_mvp: document.getElementById('pMvp').checked,
          is_svp: document.getElementById('pSvp').checked,
        };
        if (!body.champion) { alert('Escolha um champion'); return; }

        const res = await fetch('/api/player/matches', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (res.ok) {
          playerInited = false;
          loadPlayerData();
        } else {
          const err = await res.json();
          alert(err.detail || 'Erro ao salvar');
        }
      }

      async function deletePlayerMatch(id) {
        if (!confirm('Remover esta partida?')) return;
        const res = await fetch(`/api/player/matches/${id}`, { method: 'DELETE' });
        if (res.ok) {
          playerInited = false;
          loadPlayerData();
        }
      }

      // Check auth on load
      checkAuth().then(updateNav);

      // ============================================================
      // Open Series Meta
      // ============================================================
      let osData = null;
      let osInited = false;

      function initOpenSeries() {
        if (osInited) { renderOpenSeries(); return; }
        loadOpenSeries(false);
      }

      async function loadOpenSeries(forceRefresh) {
        const content = document.getElementById('osContent');
        const banner = document.getElementById('osSourceBanner');
        content.innerHTML = '<p style="color:var(--text-muted)">Carregando dados da Open Series...</p>';

        try {
          const url = forceRefresh ? '/openseries?refresh=force' : '/openseries';
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          osData = data.champions || [];
          osInited = true;

          if (data.last_fetch) {
            const d = new Date(data.last_fetch);
            banner.textContent = `Última atualização: ${d.toLocaleString('pt-BR')} • ${data.total} campeões`;
          } else {
            banner.textContent = `Fonte: openseries.com.br • ${data.total} campeões`;
          }

          renderOpenSeries();
        } catch (err) {
          content.innerHTML = `<p style="color:var(--red)">Erro ao carregar dados: ${err.message}</p>`;
        }
      }

      function renderOpenSeries() {
        if (!osData) return;
        const content = document.getElementById('osContent');
        const search = (document.getElementById('osSearch')?.value || '').toLowerCase();
        const sortField = document.getElementById('osSortField')?.value || 'pick_rate';
        const sortDir = document.getElementById('osSortDir')?.value || 'desc';

        let rows = osData.filter(c => !search || c.champion.toLowerCase().includes(search));

        rows.sort((a, b) => {
          let va = a[sortField], vb = b[sortField];
          if (typeof va === 'string') {
            return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
          }
          return sortDir === 'asc' ? va - vb : vb - va;
        });

        function pct(v) { return (v * 100).toFixed(1) + '%'; }
        function winColor(v) {
          if (v >= 0.55) return 'var(--green)';
          if (v <= 0.45) return 'var(--red)';
          return 'var(--text-primary)';
        }

        let html = `<table class="data-table" style="width:100%;border-collapse:collapse;font-size:0.84rem;">
          <thead><tr>
            <th style="text-align:left;padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);">#</th>
            <th style="text-align:left;padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);">CAMPEÃO</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">PICKS</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">PICK%</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">BANS</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">BAN%</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">WIN%</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">KDA</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">K/D/A</th>
            <th style="padding:0.5rem 0.7rem;color:var(--text-muted);font-size:0.75rem;border-bottom:1px solid var(--border);text-align:center;">GOLD MÉD.</th>
          </tr></thead><tbody>`;

        rows.forEach((c, i) => {
          const kda = c.avg_kills && c.avg_deaths
            ? `${c.avg_kills.toFixed(1)}/${c.avg_deaths.toFixed(1)}/${c.avg_assists.toFixed(1)}`
            : '—';
          const gold = c.avg_gold ? c.avg_gold.toLocaleString('pt-BR') : '—';
          const presence = ((c.pick_rate + c.ban_rate) * 100).toFixed(1);
          html += `<tr style="border-bottom:1px solid var(--border);transition:background 0.1s;" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
            <td style="padding:0.45rem 0.7rem;color:var(--text-muted);font-size:0.75rem;">${i + 1}</td>
            <td style="padding:0.45rem 0.7rem;font-weight:600;">${c.champion}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;">${c.picks}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;color:#8B5CF6;">${pct(c.pick_rate)}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;">${c.bans}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;color:var(--text-secondary);">${pct(c.ban_rate)}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;font-weight:700;color:${winColor(c.win_rate)};">${pct(c.win_rate)}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;color:#10B981;">${c.kda ? c.kda.toFixed(2) : '—'}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;font-family:var(--font-mono);font-size:0.8rem;">${kda}</td>
            <td style="padding:0.45rem 0.7rem;text-align:center;color:#F59E0B;">${gold}</td>
          </tr>`;
        });

        html += `</tbody></table>`;
        if (rows.length === 0) {
          html = '<p style="color:var(--text-muted)">Nenhum campeão encontrado.</p>';
        }
        content.innerHTML = html;
      }

      // Wire up live search and sort controls
      document.addEventListener('DOMContentLoaded', () => {
        ['osSearch', 'osSortField', 'osSortDir'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.addEventListener('input', () => { if (osInited) renderOpenSeries(); });
        });
      });
    </script>
  </body>
</html>
